<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daftar Hadir Pengajian</title>
<!-- ====== CDN: hanya dipakai untuk fitur QR / PDF / Excel. Sisanya 100% lokal (LocalStorage). ====== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ========================================================================
   DAFTAR HADIR PENGAJIAN — CSS
   Palet: Hijau (#0f5132 / #1b7a4d), Putih (#fdfcf7), Emas (#c9a227)
   ======================================================================== */
:root{
  --green-900:#0b3d24;
  --green-800:#0f5132;
  --green-700:#15703f;
  --green-600:#1b7a4d;
  --green-100:#e6f4ec;
  --gold:#c9a227;
  --gold-light:#e9d28a;
  --white:#fdfcf7;
  --ink:#1c2620;
  --muted:#6b776f;
  --border:#e3e8e3;
  --danger:#c0392b;
  --radius:16px;
  --shadow:0 6px 20px rgba(15,81,50,.08);
  --bg:#f4f7f4;
  --card:#ffffff;
}
[data-theme="dark"]{
  --bg:#0e1512;
  --card:#15201a;
  --ink:#eef3ee;
  --muted:#9fb0a6;
  --border:#243029;
  --white:#15201a;
  --green-100:#16291f;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
button,input,select,textarea{font-family:inherit;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;}
.hidden{display:none !important;}

/* ---------- App shell ---------- */
#app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:78px;}
.topbar{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(135deg,var(--green-800),var(--green-600));
  color:#fff;padding:16px 16px;display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow);
}
.topbar h1{font-size:18px;margin:0;font-weight:700;flex:1;}
.topbar .icon-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.topbar .back{margin-right:2px;}
.page{padding:16px;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ---------- Bottom nav ---------- */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;background:var(--card);
  display:flex;justify-content:space-around;align-items:center;
  border-top:1px solid var(--border);padding:8px 4px 10px;z-index:30;
  box-shadow:0 -4px 16px rgba(0,0,0,.06);
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;cursor:pointer;flex:1;padding:4px;}
.nav-item.active{color:var(--green-700);font-weight:700;}
.nav-item svg{width:22px;height:22px;}
.nav-item.scan{position:relative;top:-14px;}
.nav-item.scan .scan-circle{background:linear-gradient(135deg,var(--green-700),var(--green-900));width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(15,81,50,.4);}
.nav-item.scan svg{color:#fff;width:24px;height:24px;}

/* ---------- Cards & buttons ---------- */
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--border);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;}
.btn-primary{background:linear-gradient(135deg,var(--green-700),var(--green-800));color:#fff;width:100%;}
.btn-primary:active{transform:scale(.98);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b9881a);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--green-700);color:var(--green-700);}
.btn-light{background:var(--green-100);color:var(--green-800);}
.btn-danger{background:#fdecea;color:var(--danger);}
.btn-block{width:100%;}
.btn-sm{padding:8px 12px;font-size:12.5px;border-radius:10px;}
.btn-row{display:flex;gap:10px;}
.fab{position:fixed;right:18px;bottom:90px;max-width:520px;z-index:25;background:var(--green-700);color:#fff;border:none;width:54px;height:54px;border-radius:50%;box-shadow:0 8px 18px rgba(15,81,50,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* ---------- Forms ---------- */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:12px 13px;border-radius:11px;border:1.5px solid var(--border);
  background:var(--white);color:var(--ink);font-size:14px;outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green-600);}
.input-icon{position:relative;}
.input-icon input{padding-left:38px;}
.input-icon svg{position:absolute;left:12px;top:13px;width:16px;height:16px;color:var(--muted);}
.row2{display:flex;gap:10px;}
.row2 .field{flex:1;}
.help{font-size:11.5px;color:var(--muted);margin-top:4px;}

/* ---------- Login ---------- */
.login-wrap{padding:30px 22px;text-align:center;}
.login-logo{width:88px;height:88px;border-radius:50%;margin:0 auto 14px;background:var(--green-100);display:flex;align-items:center;justify-content:center;overflow:hidden;border:3px solid var(--gold-light);}
.login-logo img{width:100%;height:100%;object-fit:cover;}
.brand-title{font-size:20px;font-weight:800;color:var(--green-800);margin:2px 0 0;}
.brand-sub{color:var(--muted);font-size:13px;margin-bottom:24px;}

/* ---------- Lists ---------- */
.list-item{display:flex;align-items:center;gap:12px;padding:13px;border-radius:14px;background:var(--card);border:1px solid var(--border);margin-bottom:10px;cursor:pointer;}
.list-item .thumb{width:54px;height:54px;border-radius:12px;background:linear-gradient(135deg,var(--green-700),var(--green-900));flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;}
.list-item .meta{flex:1;min-width:0;}
.list-item .meta h3{margin:0 0 3px;font-size:14.5px;}
.list-item .meta p{margin:0;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;}
.badge.active{background:#e3f7e9;color:#1d8a4a;}
.badge.done{background:#e6edff;color:#3354c9;}
.badge.gold{background:#fbf1d6;color:#9a7716;}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:14px;}
.search-bar input{border:none;outline:none;flex:1;background:transparent;font-size:14px;color:var(--ink);}
.tabs{display:flex;gap:8px;margin-bottom:14px;}
.tab{flex:1;text-align:center;padding:9px;border-radius:10px;font-size:12.5px;font-weight:700;background:var(--green-100);color:var(--green-800);cursor:pointer;}
.tab.active{background:var(--green-700);color:#fff;}

/* ---------- Stat grid ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);}
.stat-card .ic{width:34px;height:34px;border-radius:9px;background:var(--green-100);color:var(--green-700);display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.stat-card h2{margin:0;font-size:19px;}
.stat-card p{margin:2px 0 0;font-size:11.5px;color:var(--muted);}
.section-title{display:flex;align-items:center;justify-content:between;font-size:15px;font-weight:800;margin:18px 0 10px;color:var(--green-800);}

/* ---------- Detail rows ---------- */
.detail-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-row .ic{width:30px;height:30px;border-radius:8px;background:var(--green-100);color:var(--green-700);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.detail-row .lbl{font-size:11px;color:var(--muted);margin-bottom:2px;}
.detail-row .val{font-size:13.5px;font-weight:600;}
.banner-cover{width:100%;height:130px;border-radius:14px;background:linear-gradient(135deg,var(--green-800),var(--green-900));margin-bottom:14px;display:flex;align-items:center;justify-content:center;color:var(--gold-light);position:relative;overflow:hidden;}

/* ---------- Table ---------- */
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--card);}
th,td{padding:9px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);}
th{background:var(--green-100);color:var(--green-800);font-size:11px;}
td.edit-ic{color:var(--green-700);cursor:pointer;}

/* ---------- Signature pad ---------- */
.sig-wrap{border:1.5px dashed var(--border);border-radius:14px;background:var(--white);overflow:hidden;}
.sig-wrap canvas{width:100%;height:150px;display:block;touch-action:none;}

/* ---------- QR ---------- */
.qr-box{background:#fff;border-radius:18px;padding:20px;text-align:center;border:2px solid var(--gold-light);}
#qrcode-canvas-holder{display:flex;justify-content:center;margin:10px 0;}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.modal-bg.center{align-items:center;}
.modal{background:var(--card);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:20px;max-height:85vh;overflow-y:auto;}
.modal-bg.center .modal{border-radius:18px;margin:16px;max-width:480px;}
.modal h2{margin-top:0;font-size:16px;color:var(--green-800);}
.modal-close{float:right;background:var(--green-100);border:none;width:30px;height:30px;border-radius:9px;cursor:pointer;color:var(--green-800);}

/* ---------- Toast ---------- */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green-900);color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;z-index:99;box-shadow:0 6px 16px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.25s;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

/* ---------- misc ---------- */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state svg{width:60px;height:60px;color:var(--gold-light);margin-bottom:10px;}
.swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.swatch.sel{border-color:var(--ink);}
.banner-presets{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;}
.banner-presets .p{flex-shrink:0;padding:8px 14px;border-radius:10px;background:var(--green-100);color:var(--green-800);font-size:12.5px;font-weight:700;cursor:pointer;}
.banner-presets .p.active{background:var(--green-700);color:#fff;}
#bannerCanvas{width:100%;border-radius:14px;border:1px solid var(--border);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.switch{position:relative;width:44px;height:24px;}
.switch input{opacity:0;width:0;height:0;}
.slider-tog{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:24px;transition:.2s;}
.slider-tog:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
input:checked + .slider-tog{background:var(--green-700);}
input:checked + .slider-tog:before{transform:translateX(20px);}
.export-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
.export-grid .ebtn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;border-radius:12px;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:10.5px;font-weight:700;color:var(--ink);}
.export-grid .ebtn svg{width:22px;height:22px;}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--border);cursor:pointer;}
.menu-item .ic{width:36px;height:36px;border-radius:10px;background:var(--green-100);color:var(--green-700);display:flex;align-items:center;justify-content:center;}
.menu-item span{flex:1;font-size:13.5px;font-weight:600;}
canvas.chart{width:100%;height:150px;display:block;}
</style>
</head>
<body data-theme="light">
<div id="app"></div>
<div id="toast"></div>
<input type="file" id="fileImportLogo" accept="image/*" class="hidden">
<input type="file" id="fileImportBackup" accept="application/json" class="hidden">

<script>
/* ========================================================================
   DAFTAR HADIR PENGAJIAN — APP LOGIC (Vanilla JS, ES6)
   Semua data disimpan di LocalStorage. Tidak ada backend.
   ======================================================================== */

/* ---------------- STORAGE HELPERS ---------------- */
const DB = {
  get(key, fallback){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } },
  set(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
};
const KEYS = {
  AUTH:'dhp_auth', IDENTITY:'dhp_identity', CATEGORIES:'dhp_categories',
  ACTIVITIES:'dhp_activities', ATTENDANCE:'dhp_attendance', SETTINGS:'dhp_settings',
  SESSION:'dhp_session'
};
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ---------------- DEFAULT SEED ---------------- */
function seedIfEmpty(){
  if(!localStorage.getItem(KEYS.AUTH)){
    DB.set(KEYS.AUTH, {username:'admin', password:'admin123'});
  }
  if(!localStorage.getItem(KEYS.IDENTITY)){
    DB.set(KEYS.IDENTITY, {
      logo:'', org:'Daarul Ilmi Pengajian', name:'Daarul Ilmi Pengajian',
      address:'Jl. Masjid Al-Ikhlas No. 1', phone:'08123456789',
      footer:'Barakallahu fiikum', motto:'Menebar Ilmu, Merajut Ukhuwah'
    });
  }
  if(!localStorage.getItem(KEYS.CATEGORIES)){
    DB.set(KEYS.CATEGORIES, [
      {id:uid(), name:'Pengajian Daerah'}, {id:uid(), name:'Pengajian Rutin'},
      {id:uid(), name:'Pengajian Remaja'}, {id:uid(), name:'Pengajian Akbar'}
    ]);
  }
  if(!localStorage.getItem(KEYS.ACTIVITIES)) DB.set(KEYS.ACTIVITIES, []);
  if(!localStorage.getItem(KEYS.ATTENDANCE)) DB.set(KEYS.ATTENDANCE, []);
  if(!localStorage.getItem(KEYS.SETTINGS)){
    DB.set(KEYS.SETTINGS, {theme:'green', dark:false, defaultTz:'WIB'});
  }
}
seedIfEmpty();

/* ---------------- ICONS (inline SVG, stroke=currentColor) ---------------- */
const ICO = {

  pin:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-7.5 7-12a7 7 0 10-14 0c0 4.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>`,
  user2:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>`,

  pdf:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>`,
  bell:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>`,

  sign:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17s2-1 4 0 3 1 5-1 4-1 5 1M3 21h18"/></svg>`,

/* ---------------- ROUTER ---------------- */
function isLoggedIn(){ return DB.get(KEYS.SESSION, false) === true; }
window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', ()=>{ applyTheme(); router(); });

function applyTheme(){
  const s = DB.get(KEYS.SETTINGS, {});
  document.body.setAttribute('data-theme', s.dark ? 'dark' : 'light');
}

function go(hash){ location.hash = hash; }

function router(){
  let hash = location.hash.slice(1) || '/login';
  const parts = hash.split('/').filter(Boolean);
  const root = parts[0] || 'login';

  // Public attendance page is accessible without login (QR scan target)
  if(root === 'absen'){ return renderAbsen(parts[1]); }

  if(!isLoggedIn() && root !== 'login'){ return go('/login'); }
  if(isLoggedIn() && root === 'login'){ return go('/dashboard'); }

  switch(root){
    case 'login': return renderLogin();
    case 'dashboard': return renderDashboard();
    case 'kategori': return renderCategories();
    case 'kegiatan': return renderActivities(parts[1]);
    case 'detail': return renderActivityDetail(parts[1]);
    case 'qr': return renderQR(parts[1]);
    case 'data': return renderAttendanceData(parts[1]);
    case 'laporan': return renderLaporan(parts[1]);
    case 'rekap': return renderRekap();
    case 'banner': return renderBanner(parts[1]);
    case 'akun': return renderAkun();
    case 'pengaturan': return renderSettings();
    case 'backup': return renderBackup();
    case 'cari': return renderSearch();
    case 'scan': return renderScan();
    default: return renderDashboard();
  }
}

function appHTML(html){ document.getElementById('app').innerHTML = html; window.scrollTo(0,0); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.classList.remove('show'), 2200);
}
function fmtRp(n){ return 'Rp ' + (Number(n)||0).toLocaleString('id-ID'); }
function esc(s){ return (s||'').toString().replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function fmtDate(d){ if(!d) return '-'; const dt = new Date(d); if(isNaN(dt)) return d; return dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function activityStatus(a){
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(a.date);
  if(isNaN(d)) return {label:'Aktif', cls:'active'};
  d.setHours(0,0,0,0);
  if(d.getTime() === today.getTime()) return {label:'AKTIF', cls:'active'};
  if(d.getTime() > today.getTime()) return {label:'AKAN DATANG', cls:'gold'};
  return {label:'SELESAI', cls:'done'};
}

/* simple canvas bar chart, no external lib */
function drawBarChart(canvasId, labels, values){
  const c = document.getElementById(canvasId); if(!c) return;
  const dpr = window.devicePixelRatio||1;
  const w = c.clientWidth || 300, h = 150;
  c.width = w*dpr; c.height = h*dpr;
  const ctx = c.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const max = Math.max(1, ...values);
  const padB = 24, padT = 10, barW = Math.min(40, (w-20)/values.length - 10);
  const styles = getComputedStyle(document.body);
  ctx.fillStyle = styles.getPropertyValue('--green-700') || '#1b7a4d';
  values.forEach((v,i)=>{
    const x = 14 + i*((w-28)/values.length);
    const bh = (h-padB-padT) * (v/max);
    ctx.fillRect(x, h-padB-bh, barW, bh);
    ctx.fillStyle = styles.getPropertyValue('--ink') || '#1c2620';
    ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(v, x+barW/2, h-padB-bh-4);
    ctx.fillText(labels[i]||'', x+barW/2, h-6);
    ctx.fillStyle = styles.getPropertyValue('--green-700') || '#1b7a4d';
  });
}
function drawLineChart(canvasId, labels, values, color){
  const c = document.getElementById(canvasId); if(!c) return;
  const dpr = window.devicePixelRatio||1;
  const w = c.clientWidth||300, h=150;
  c.width=w*dpr; c.height=h*dpr;
  const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const max=Math.max(1,...values), min=0;
  const padB=20,padT=10,padL=10,padR=10;
  const stepX=(w-padL-padR)/Math.max(1,values.length-1);
  ctx.beginPath();
  values.forEach((v,i)=>{
    const x=padL+i*stepX, y=padT+(h-padT-padB)*(1-(v-min)/(max-min||1));
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle=color||'#1b7a4d'; ctx.lineWidth=2.5; ctx.stroke();
  values.forEach((v,i)=>{
    const x=padL+i*stepX, y=padT+(h-padT-padB)*(1-(v-min)/(max-min||1));
    ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fillStyle=color||'#1b7a4d'; ctx.fill();
  });
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--muted')||'#6b776f';
  ctx.font='10px sans-serif'; ctx.textAlign='center';
  labels.forEach((l,i)=>{ const x=padL+i*stepX; ctx.fillText(l,x,h-4); });
}

        <button class="btn btn-primary" style="flex:1" onclick="submitAbsen('${a.id}')">Simpan</button>

function initSignaturePad(){
  const c = document.getElementById('sigPad');
  const dpr = window.devicePixelRatio||1;
  const resize = ()=>{
    const w = c.clientWidth, h = c.clientHeight || 150;
    c.width = w*dpr; c.height = h*dpr;
    sigCtx = c.getContext('2d'); sigCtx.scale(dpr,dpr);
    sigCtx.lineWidth=2.2; sigCtx.lineCap='round'; sigCtx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--ink')||'#1c2620';
  };
  resize();
  let last=null;
  const pos = e=>{
    const r = c.getBoundingClientRect();
    const t = e.touches? e.touches[0] : e;
    return {x:t.clientX-r.left, y:t.clientY-r.top};
  };
  const start = e=>{ sigDrawing=true; sigHasInk=true; last=pos(e); e.preventDefault();};
  const move = e=>{ if(!sigDrawing) return; const p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(last.x,last.y); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); last=p; e.preventDefault();};
  const end = ()=>{ sigDrawing=false; };
  c.addEventListener('mousedown', start); c.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
  c.addEventListener('touchstart', start, {passive:false}); c.addEventListener('touchmove', move, {passive:false}); c.addEventListener('touchend', end);
}
function clearSig(){
  const c = document.getElementById('sigPad');
  sigCtx.clearRect(0,0,c.width,c.height); sigHasInk=false;
}
function resetAbsenForm(){
  ['ab-name','ab-dapukan','ab-phone','ab-address','ab-note'].forEach(id=>document.getElementById(id).value='');

function exportPDF(activityId){
  if(!window.jspdf){ toast('Library PDF belum dimuat (perlu koneksi internet)'); return; }
  const a = DB.get(KEYS.ACTIVITIES,[]).find(x=>x.id===activityId);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const id_ = DB.get(KEYS.IDENTITY,{});
  const rows = reportRows(activityId);
  doc.setFontSize(14); doc.setTextColor(15,81,50);
  doc.text(id_.name||'', 105, 14, {align:'center'});
  doc.setFontSize(11); doc.setTextColor(0);
  doc.text('DAFTAR HADIR - '+a.name, 105, 22, {align:'center'});
  doc.setFontSize(9);
  doc.text(`${fmtDate(a.date)} | ${a.timeStart||''}-${a.timeEnd||''} ${a.tz||''} | ${a.location||''}`, 105, 28, {align:'center'});
  let y = 38;
  doc.setFontSize(8);
  const headers = ['No','Nama','Dapukan','No HP','Infak','Jam','Ket'];
  const colX = [10,18,55,90,120,145,165];
  headers.forEach((h,i)=>doc.text(h, colX[i], y));
  y+=5; doc.line(10,y-3,200,y-3);
  rows.forEach((r,i)=>{
    if(y>280){ doc.addPage(); y=15; }
    doc.text(String(i+1), colX[0], y);
    doc.text(String(r.name||'').slice(0,18), colX[1], y);

function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

/* ======================================================================
   BANNER / SPANDUK GENERATOR
   ====================================================================== */
const BANNER_SIZES = {
  'Spanduk':[1500,500], 'Banner':[800,1200], 'Poster':[1000,1400], 'Flyer':[900,1300],
  'A4':[826,1169], 'A3':[1169,1654], 'Custom':[1000,1000]
};
let currentBannerSize = 'Banner';
function renderBanner(activityId){
  const acts = DB.get(KEYS.ACTIVITIES,[]);
  const a = acts.find(x=>x.id===activityId) || acts[0];
  appHTML(`
  ${topbar('Buat Banner / Spanduk', {backHash: activityId?'#/detail/'+activityId:'#/dashboard'})}
  <div class="page">
    <div class="field"><label>Pilih Kegiatan</label>
      <select id="bn-act" onchange="go('/banner/'+this.value)">
        ${acts.map(x=>`<option value="${x.id}" ${a&&x.id===a.id?'selected':''}>${esc(x.name)}</option>`).join('')}
      </select></div>
    ${a? `
    <div class="banner-presets" id="bnPresets">
      ${Object.keys(BANNER_SIZES).map(k=>`<div class="p ${k===currentBannerSize?'active':''}" onclick="setBannerSize('${k}','${a.id}')">${k}</div>`).join('')}
    </div>
    <canvas id="bannerCanvas"></canvas>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="downloadBanner('png','${a.id}')">${ICO.download} PNG</button>
      <button class="btn btn-outline" style="flex:1" onclick="downloadBanner('jpg','${a.id}')">${ICO.download} JPG</button>
    </div>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-light" style="flex:1" onclick="downloadBannerPDF('${a.id}')">${ICO.pdf} PDF</button>
      <button class="btn btn-primary" style="flex:1" onclick="shareBanner('${a.id}')">${ICO.whatsapp} Bagikan</button>
    </div>
    ` : `<div class="empty-state">${ICO.banner}<p>Tambahkan kegiatan terlebih dahulu.</p></div>`}
  </div>`);
  if(a) drawBanner(a.id);
}
function setBannerSize(size, activityId){
  currentBannerSize = size;
  document.querySelectorAll('#bnPresets .p').forEach(p=>p.classList.toggle('active', p.textContent===size));
  drawBanner(activityId);
}
function drawBanner(activityId){
  const a = DB.get(KEYS.ACTIVITIES,[]).find(x=>x.id===activityId);
  const id_ = DB.get(KEYS.IDENTITY,{});
  const [W,H] = BANNER_SIZES[currentBannerSize];
  const c = document.getElementById('bannerCanvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  // background gradient (islamic elegant green/gold)
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#0b3d24'); grad.addColorStop(1,'#15703f');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
  // decorative gold border
  ctx.strokeStyle = '#c9a227'; ctx.lineWidth = Math.max(4,W*0.006);
  ctx.strokeRect(W*0.02,H*0.02,W*0.96,H*0.96);
  // decorative dome shapes
  ctx.fillStyle = 'rgba(201,162,39,0.15)';
  for(let i=0;i<5;i++){ ctx.beginPath(); ctx.arc(W*(0.1+i*0.2), H*0.95, W*0.06, Math.PI, 0); ctx.fill(); }
  // title
  ctx.textAlign='center';
  ctx.fillStyle = '#e9d28a';
  ctx.font = `bold ${Math.round(W*0.05)}px Arial`;
  wrapText(ctx, a.name, W/2, H*0.28, W*0.85, W*0.06);
  ctx.fillStyle = '#fdfcf7';
  ctx.font = `${Math.round(W*0.026)}px Arial`;
  ctx.fillText(a.theme||'', W/2, H*0.4);
  if(a.presenter){ ctx.font = `${Math.round(W*0.024)}px Arial`; ctx.fillText('Bersama: '+a.presenter, W/2, H*0.46); }
  ctx.fillStyle = '#c9a227';
  ctx.font = `bold ${Math.round(W*0.03)}px Arial`;
  ctx.fillText(`${fmtDate(a.date)}  •  ${a.timeStart||''} ${a.tz||''}`, W/2, H*0.58);
  ctx.fillStyle = '#fdfcf7';
  ctx.font = `${Math.round(W*0.024)}px Arial`;
  ctx.fillText(a.location||'', W/2, H*0.64);
  ctx.font = `${Math.round(W*0.018)}px Arial`;
  ctx.fillStyle='#cfe3d6';
  ctx.fillText(id_.name||'', W/2, H*0.93);
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words = (text||'').split(' ');
  let line='', yy=y;
  words.forEach(w=>{
    const test = line+w+' ';
    if(ctx.measureText(test).width > maxWidth && line){ ctx.fillText(line,x,yy); line=w+' '; yy+=lineHeight; }
    else line = test;
  });
  ctx.fillText(line,x,yy);
}
function downloadBanner(fmt, activityId){
  const c = document.getElementById('bannerCanvas');
  const a = DB.get(KEYS.ACTIVITIES,[]).find(x=>x.id===activityId);
  const link = document.createElement('a');
  link.download = `Banner-${a.name}.${fmt==='jpg'?'jpg':'png'}`;
  link.href = c.toDataURL(fmt==='jpg'?'image/jpeg':'image/png', 0.92);
  link.click();
}
function downloadBannerPDF(activityId){
  if(!window.jspdf){ toast('Library PDF belum dimuat'); return; }
  const c = document.getElementById('bannerCanvas');
  const a = DB.get(KEYS.ACTIVITIES,[]).find(x=>x.id===activityId);
  const { jsPDF } = window.jspdf;
  const orient = c.width>c.height ? 'l':'p';
  const doc = new jsPDF({orientation:orient, unit:'px', format:[c.width,c.height]});
  doc.addImage(c.toDataURL('image/jpeg',0.92),'JPEG',0,0,c.width,c.height);
  doc.save(`Banner-${a.name}.pdf`);
  toast('Banner PDF diunduh');
}

  const a = DB.get(KEYS.ACTIVITIES,[]).find(x=>x.id===activityId);

  shareActivity(activityId);
}

  document.getElementById('fileImportBackup').onchange = (e)=>{

      try{
        const data = JSON.parse(reader.result);
        confirmDialog('Timpa seluruh data dengan file backup ini?', ()=>{
          Object.keys(KEYS).forEach(k=>{ if(data[KEYS[k]]!==undefined) DB.set(KEYS[k], data[KEYS[k]]); });
          toast('Data berhasil dipulihkan'); go('/dashboard');
        });
      }catch(err){ toast('File backup tidak valid'); }
    };
    reader.readAsText(f);
  };
}

  const data = {};
  Object.keys(KEYS).forEach(k=>{ data[KEYS[k]] = DB.get(KEYS[k], null); });

function doSearch(q){
  const box = document.getElementById('searchResults');
  if(!q.trim()){ box.innerHTML = `<div class="empty-state">${ICO.search}<p>Ketik kata kunci untuk mencari.</p></div>`; return; }
  q = q.toLowerCase();
  const acts = DB.get(KEYS.ACTIVITIES,[]);
  const cats = DB.get(KEYS.CATEGORIES,[]);
  const att = DB.get(KEYS.ATTENDANCE,[]);
  const matchActs = acts.filter(a=>(a.name+a.location+fmtDate(a.date)+(cats.find(c=>c.id===a.categoryId)?.name||'')).toLowerCase().includes(q));
  const matchAtt = att.filter(a=>(a.name+a.dapukan+a.phone+a.address).toLowerCase().includes(q));
  let html='';
  if(matchActs.length){ html += `<div class="section-title">Kegiatan</div>` + matchActs.map(a=>activityListItem(a,cats)).join(''); }
  if(matchAtt.length){ html += `<div class="section-title">Peserta</div>` + matchAtt.map(x=>{
    const a = acts.find(y=>y.id===x.activityId);
    return `<div class="list-item" onclick="go('/data/${x.activityId}')"><div class="thumb">${ICO.user2}</div>
      <div class="meta"><h3>${esc(x.name)}</h3><p>${esc(x.dapukan)} • ${esc(x.phone)} • ${a?esc(a.name):''}</p></div></div>`;
  }).join(''); }
  box.innerHTML = html || `<div class="empty-state">${ICO.search}<p>Tidak ditemukan.</p></div>`;
}

/* ======================================================================

   ====================================================================== */
function showModal(html, center){
  let bg = document.getElementById('modalBg');
  if(bg) bg.remove();
  bg = document.createElement('div');
  bg.id = 'modalBg'; bg.className = 'modal-bg'+(center?' center':'');
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.addEventListener('click', e=>{ if(e.target===bg) closeModal(); });
  document.body.appendChild(bg);
}
function closeModal(){ const bg = document.getElementById('modalBg'); if(bg) bg.remove(); }
function confirmDialog(msg, onYes){
  showModal(`
    <h2 style="margin-top:0">Konfirmasi</h2>
    <p>${esc(msg)}</p>
    <div class="btn-row">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal()">Batal</button>
      <button class="btn btn-danger" style="flex:1" id="confirmYesBtn">Ya, Lanjutkan</button>
    </div>
  `, true);
  document.getElementById('confirmYesBtn').onclick = ()=>{ closeModal(); onYes(); };
}
